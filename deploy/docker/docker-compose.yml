services:
  teamflow:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./data/teamflow.db
      SERVE_WEB: "true"
    volumes:
      - teamflow-data:/app/data
    restart: unless-stopped

volumes:
  teamflow-data:
